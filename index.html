<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APO Packhouse Overtime Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#1E2A38;
    --ink-soft:#354758;
    --paper:#F1EEE4;
    --paper-raised:#FAF8F2;
    --paper-line:#DAD5C4;
    --amber:#D98E2B;
    --amber-dark:#8C5A16;
    --amber-tint:#F3DFB8;
    --teal:#3C6E62;
    --red:#A63D2F;
    --shadow: 0 1px 0 rgba(30,42,56,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:32px 20px 64px;
  }
  .masthead{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;
    margin-bottom:22px;
  }
  .masthead h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:30px;
    margin:0;
    letter-spacing:-0.01em;
  }
  .masthead .sub{
    font-size:12.5px;
    color:var(--ink-soft);
    letter-spacing:0.04em;
    text-transform:uppercase;
    margin-top:4px;
  }
  .month-nav{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .month-nav button{
    background:none;
    border:1px solid var(--ink);
    color:var(--ink);
    width:30px;height:30px;
    border-radius:50%;
    cursor:pointer;
    font-size:15px;
    line-height:1;
    display:flex;align-items:center;justify-content:center;
    transition:background 0.15s;
  }
  .month-nav button:hover{ background:var(--ink); color:var(--paper-raised); }
  .month-label{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:19px;
    min-width:150px;
    text-align:center;
  }

  .summary-bar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
  }
  .stamp{
    background:var(--paper-raised);
    border:1px solid var(--paper-line);
    border-radius:8px;
    padding:10px 16px;
    box-shadow:var(--shadow);
  }
  .stamp .n{
    font-family:'IBM Plex Mono',monospace;
    font-size:20px;
    font-weight:600;
    color:var(--amber-dark);
  }
  .stamp .l{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-soft);
    margin-top:2px;
  }

  .grid{
    background:var(--paper-raised);
    border:1px solid var(--paper-line);
    border-radius:10px;
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  .dow-row, .week-row{
    display:grid;
    grid-template-columns:repeat(7,1fr);
  }
  .dow-row div{
    text-align:center;
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    padding:10px 4px;
    border-bottom:1px solid var(--paper-line);
    font-weight:600;
  }
  .day-cell{
    min-height:78px;
    border-right:1px solid var(--paper-line);
    border-bottom:1px solid var(--paper-line);
    padding:6px 6px;
    cursor:pointer;
    position:relative;
    transition:background 0.15s;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }
  .week-row .day-cell:last-child{ border-right:none; }
  .day-cell:hover{ background:#EFE9DA; }
  .day-cell.empty{ cursor:default; background:repeating-linear-gradient(135deg, transparent, transparent 6px, #E9E4D6 6px, #E9E4D6 7px); }
  .day-cell.empty:hover{ background:repeating-linear-gradient(135deg, transparent, transparent 6px, #E9E4D6 6px, #E9E4D6 7px); }
  .day-cell.today .num{
    background:var(--ink);
    color:var(--paper-raised);
    border-radius:50%;
  }
  .day-cell.selected{ outline:2px solid var(--amber); outline-offset:-2px; background:#F7EFDD; }
  .num{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    width:22px;height:22px;
    display:flex;align-items:center;justify-content:center;
  }
  .tally{
    align-self:flex-start;
    background:var(--amber-tint);
    color:var(--amber-dark);
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    font-weight:600;
    padding:2px 6px;
    border-radius:5px;
    transform:rotate(-2deg);
  }

  .panel{
    margin-top:22px;
    background:var(--paper-raised);
    border:1px solid var(--paper-line);
    border-radius:10px;
    padding:18px 20px 20px;
    box-shadow:var(--shadow);
  }
  .panel-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:12px;
  }

    font-family:'Fraunces',serif;
    font-size:18p
