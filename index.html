<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APO Packhouse Overtime Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#1E2A38;
    --ink-soft:#354758;
    --paper:#F1EEE4;
    --paper-raised:#FAF8F2;
    --paper-line:#DAD5C4;
    --amber:#D98E2B;
    --amber-dark:#8C5A16;
    --amber-tint:#F3DFB8;
    --teal:#3C6E62;
    --red:#A63D2F;
    --shadow: 0 1px 0 rgba(30,42,56,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:32px 20px 64px;
  }
  .masthead{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;
    margin-bottom:22px;
  }
  .masthead h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:30px;
    margin:0;
    letter-spacing:-0.01em;
  }
  .masthead .sub{
    font-size:12.5px;
    color:var(--ink-soft);
    letter-spacing:0.04em;
    text-transform:uppercase;
    margin-top:4px;
  }
  .month-nav{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .month-nav button{
    background:none;
    border:1px solid var(--ink);
    color:var(--ink);
    width:30px;height:30px;
    border-radius:50%;
    cursor:pointer;
    font-size:15px;
    line-height:1;
    display:flex;align-items:center;justify-content:center;
    transition:background 0.15s;
  }
  .month-nav button:hover{ background:var(--ink); color:var(--paper-raised); }
  .month-label{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:19px;
    min-width:150px;
    text-align:center;
  }

  .summary-bar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
  }
  .stamp{
    background:var(--paper-raised);
    border:1px solid var(--paper-line);
    border-radius:8px;
    padding:10px 16px;
    box-shadow:var(--shadow);
  }
  .stamp .n{
    font-family:'IBM Plex Mono',monospace;
    font-size:20px;
    font-weight:600;
    color:var(--amber-dark);
  }
  .stamp .l{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-soft);
    margin-top:2px;
  }

  .grid{
    background:var(--paper-raised);
    border:1px solid var(--paper-line);
    border-radius:10px;
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  .dow-row, .week-row{
    display:grid;
    grid-template-columns:repeat(7,1fr);
  }
  .dow-row div{
    text-align:center;
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    padding:10px 4px;
    border-bottom:1px solid var(--paper-line);
    font-weight:600;
  }
  .day-cell{
    min-height:78px;
    border-right:1px solid var(--paper-line);
    border-bottom:1px solid var(--paper-line);
    padding:6px 6px;
    cursor:pointer;
    position:relative;
    transition:background 0.15s;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }
  .week-row .day-cell:last-child{ border-right:none; }
  .day-cell:hover{ background:#EFE9DA; }
  .day-cell.empty{ cursor:default; background:repeating-linear-gradient(135deg, transparent, transparent 6px, #E9E4D6 6px, #E9E4D6 7px); }
  .day-cell.empty:hover{ background:repeating-linear-gradient(135deg, transparent, transparent 6px, #E9E4D6 6px, #E9E4D6 7px); }
  .day-cell.today .num{
    background:var(--ink);
    color:var(--paper-raised);
    border-radius:50%;
  }
  .day-cell.selected{ outline:2px solid var(--amber); outline-offset:-2px; background:#F7EFDD; }
  .num{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    width:22px;height:22px;
    display:flex;align-items:center;justify-content:center;
  }
  .tally{
    align-self:flex-start;
    background:var(--amber-tint);
    color:var(--amber-dark);
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    font-weight:600;
    padding:2px 6px;
    border-radius:5px;
    transform:rotate(-2deg);
  }

  .panel{
    margin-top:22px;
    background:var(--paper-raised);
    border:1px solid var(--paper-line);
    border-radius:10px;
    padding:18px 20px 20px;
    box-shadow:var(--shadow);
  }
  .panel-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:12px;
  }
  .panel-head h2{
    font-family:'Fraunces',serif;
    font-size:18px;
    font-weight:600;
    margin:0;
  }
  .panel-head .tot{
    font-size:12.5px;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace;
  }
  .entries{ margin-bottom:14px; }
  .entry-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 0;
    border-bottom:1px dashed var(--paper-line);
    font-size:13.5px;
  }
  .entry-row:last-child{ border-bottom:none; }
  .entry-time{
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    color:var(--ink);
    white-space:nowrap;
  }
  .entry-hours{
    font-family:'IBM Plex Mono',monospace;
    color:var(--amber-dark);
    font-weight:600;
    white-space:nowrap;
  }
  .entry-note{
    color:var(--ink-soft);
    flex:1;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .entry-del{
    background:none;
    border:none;
    color:var(--red);
    cursor:pointer;
    font-size:16px;
    padding:2px 6px;
    line-height:1;
  }
  .entry-del:hover{ opacity:0.7; }
  .empty-note{
    color:var(--ink-soft);
    font-size:13.5px;
    padding:8px 0 14px;
  }

  .shift-group{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .shift-btn{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:2px;
    background:var(--paper);
    border:1px solid var(--paper-line);
    border-radius:8px;
    padding:8px 14px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:500;
    color:var(--ink);
    transition:background 0.15s, border-color 0.15s;
  }
  .shift-btn:hover{ border-color:var(--amber); }
  .shift-btn.active{
    background:var(--amber-tint);
    border-color:var(--amber-dark);
    color:var(--amber-dark);
  }
  .shift-time{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    font-weight:600;
    color:var(--ink-soft);
  }
  .shift-btn.active .shift-time{ color:var(--amber-dark); }

  .add-form{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:flex-end;
    border-top:1px solid var(--paper-line);
    padding-top:14px;
  }
  .field{ display:flex; flex-direction:column; gap:4px; }
  .field label{
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-soft);
  }
  .field input{
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    padding:7px 9px;
    border:1px solid var(--paper-line);
    border-radius:6px;
    background:var(--paper);
    color:var(--ink);
  }
  .field input:focus{ outline:2px solid var(--amber); outline-offset:0; border-color:var(--amber); }
  .field.note input{ width:180px; }
  .add-btn{
    background:var(--ink);
    color:var(--paper-raised);
    border:none;
    border-radius:6px;
    padding:8px 16px;
    font-size:13.5px;
    font-weight:500;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .add-btn:hover{ background:var(--ink-soft); }
  .form-msg{
    font-size:12px;
    color:var(--red);
    width:100%;
  }

  @media (max-width:560px){
    .day-cell{ min-height:58px; padding:4px; }
    .num{ font-size:11px; width:18px; height:18px; }
    .tally{ font-size:9.5px; padding:1px 4px; }
    .masthead h1{ font-size:24px; }
    .field.note input{ width:140px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div>
      <h1>APO Packhouse Overtime Schedule</h1>
      <div class="sub" id="syncStatus">Connecting…</div>
    </div>
    <div class="month-nav">
      <button id="prevBtn" aria-label="Previous month">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button id="nextBtn" aria-label="Next month">›</button>
    </div>
  </div>

  <div class="summary-bar">
    <div class="stamp"><div class="n" id="sumHours">0.0h</div><div class="l">This month</div></div>
    <div class="stamp"><div class="n" id="sumDays">0</div><div class="l">Days logged</div></div>
    <div class="stamp"><div class="n" id="sumEntries">0</div><div class="l">Entries</div></div>
  </div>

  <div class="grid">
    <div class="dow-row">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    <div id="calendarBody"></div>
  </div>

  <div class="panel" id="panel">
    <div class="panel-head">
      <h2 id="panelDate">Select a date</h2>
      <div class="tot" id="panelTotal"></div>
    </div>
    <div class="entries" id="entriesList"></div>
    <div class="add-form" id="addForm" style="display:none;">
      <div class="field" style="flex:1 1 100%;">
        <label>Shift</label>
        <div class="shift-group" id="shiftGroup">
          <button type="button" class="shift-btn" data-shift="first">First shift<span class="shift-time">12:00 AM – 8:00 AM</span></button>
          <button type="button" class="shift-btn" data-shift="second">Second shift<span class="shift-time">8:00 AM – 4:00 PM</span></button>
          <button type="button" class="shift-btn" data-shift="third">Third shift<span class="shift-time">4:00 PM – 12:00 AM</span></button>
        </div>
      </div>
      <div class="field note">
        <label for="noteInput">Note (optional)</label>
        <input type="text" id="noteInput" placeholder="e.g. Month-end closing">
      </div>
      <button class="add-btn" id="addBtn">Add entry</button>
      <div class="form-msg" id="formMsg"></div>
    </div>
  </div>

</div>

<script>
(function(){
  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // ---- Firebase setup ----
  // 1. Create a free project at https://console.firebase.google.com
  // 2. Add a Web App inside it, then paste the config object it gives you below.
  // 3. Enable Firestore Database (Build > Firestore Database > Create database).
  // 4. Set Firestore rules to allow open read/write on the "overtime" collection
  //    (see the setup guide for the exact rule text).
  const firebaseConfig = {
    apiKey: "AIzaSyA3B1uvaCEhMF7kDN_cnxrNOREdlSBl1t8",
    authDomain: "apo-pack-overtime-schedule.firebaseapp.com",
    projectId: "apo-pack-overtime-schedule",
    storageBucket: "apo-pack-overtime-schedule.firebasestorage.app",
    messagingSenderId: "55428287155",
    appId: "1:55428287155:web:5a1a3d425fc7d3a118bec6"
  };

  let db = null;
  let docRef = null;
  let firebaseReady = false;

  try{
    if(firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY"){
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      docRef = db.collection('overtime').doc('shared-log');
      firebaseReady = true;
    }
  }catch(e){
    console.error('Firebase init failed', e);
  }

  const SHIFTS = {
    first:  { label: 'First shift',  start: '00:00', end: '08:00', hours: 8 },
    second: { label: 'Second shift', start: '08:00', end: '16:00', hours: 8 },
    third:  { label: 'Third shift',  start: '16:00', end: '00:00', hours: 8 }
  };
  let selectedShift = null;

  let data = {};
  let current = new Date();
  current.setDate(1);
  let selectedDate = null;

  const pad = n => String(n).padStart(2,'0');
  const dateKey = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
  const todayKey = (() => {
    const t = new Date();
    return dateKey(t.getFullYear(), t.getMonth(), t.getDate());
  })();

  function timeToMinutes(t){
    const [h,m] = t.split(':').map(Number);
    return h*60+m;
  }
  function computeHours(start,end){
    let s = timeToMinutes(start), e = timeToMinutes(end);
    if(e <= s) e += 24*60;
    return Math.round(((e-s)/60)*100)/100;
  }
  function fmtTime(t){
    const [h,m] = t.split(':').map(Number);
    const period = h >= 12 ? 'PM' : 'AM';
    let h12 = h % 12; if(h12===0) h12=12;
    return `${h12}:${pad(m)} ${period}`;
  }

  const LOCAL_FALLBACK_KEY = 'overtime-entries';
  const statusEl = document.getElementById('syncStatus');

  function setStatus(text){
    if(statusEl) statusEl.textContent = text;
  }

  function listenForChanges(onFirstLoad){
    if(!firebaseReady){
      setStatus('Not connected to cloud storage \u2014 saving to this browser only');
      try{
        const raw = localStorage.getItem(LOCAL_FALLBACK_KEY);
        data = raw ? JSON.parse(raw) : {};
      }catch(e){ data = {}; }
      onFirstLoad();
      return;
    }
    docRef.onSnapshot(snap => {
      const remote = snap.exists ? snap.data() : {};
      data = (remote && remote.entries) ? remote.entries : {};
      setStatus('Synced \u2014 shared with your team');
      onFirstLoad();
    }, err => {
      console.error('Sync error', err);
      setStatus('Connection issue \u2014 check your Firestore rules');
    });
  }

  async function saveData(){
    if(!firebaseReady){
      try{ localStorage.setItem(LOCAL_FALLBACK_KEY, JSON.stringify(data)); }
      catch(e){ console.error('Could not save locally', e); }
      return;
    }
    try{
      await docRef.set({ entries: data }, { merge: false });
    }catch(e){
      console.error('Could not save to cloud', e);
      setStatus('Could not save \u2014 check your connection');
      alert('Could not save your entry to the cloud. Check your internet connection and try again.');
    }
  }

  function dayTotal(key){
    const list = data[key] || [];
    return Math.round(list.reduce((sum,e)=>sum+e.hours,0)*100)/100;
  }

  function renderCalendar(){
    const y = current.getFullYear(), m = current.getMonth();
    document.getElementById('monthLabel').textContent = `${MONTHS[m]} ${y}`;

    const firstDow = new Date(y,m,1).getDay();
    const daysInMonth = new Date(y,m+1,0).getDate();
    const body = document.getElementById('calendarBody');
    body.innerHTML = '';

    let cellIndex = 0;
    let html = '';
    const totalCells = Math.ceil((firstDow + daysInMonth) / 7) * 7;

    for(let i=0;i<totalCells;i++){
      if(i % 7 === 0) html += '<div class="week-row">';
      const dayNum = i - firstDow + 1;
      if(dayNum < 1 || dayNum > daysInMonth){
        html += `<div class="day-cell empty"></div>`;
      }else{
        const key = dateKey(y,m,dayNum);
        const total = dayTotal(key);
        const isToday = key === todayKey;
        const isSelected = key === selectedDate;
        html += `<div class="day-cell${isToday?' today':''}${isSelected?' selected':''}" data-key="${key}" data-day="${dayNum}">
          <span class="num">${dayNum}</span>
          ${total > 0 ? `<span class="tally">${total}h</span>` : ''}
        </div>`;
      }
      if(i % 7 === 6) html += '</div>';
    }
    body.innerHTML = html;

    body.querySelectorAll('.day-cell:not(.empty)').forEach(cell=>{
      cell.addEventListener('click', ()=>{
        selectedDate = cell.dataset.key;
        renderCalendar();
        renderPanel();
      });
    });

    renderSummary();
  }

  function renderSummary(){
    const y = current.getFullYear(), m = current.getMonth();
    const prefix = `${y}-${pad(m+1)}-`;
    let totalHours = 0, days = 0, entries = 0;
    Object.keys(data).forEach(key=>{
      if(key.startsWith(prefix) && data[key].length){
        days++;
        entries += data[key].length;
        totalHours += dayTotal(key);
      }
    });
    document.getElementById('sumHours').textContent = `${Math.round(totalHours*100)/100}h`;
    document.getElementById('sumDays').textContent = days;
    document.getElementById('sumEntries').textContent = entries;
  }

  function renderPanel(){
    const addForm = document.getElementById('addForm');
    const panelDate = document.getElementById('panelDate');
    const panelTotal = document.getElementById('panelTotal');
    const entriesList = document.getElementById('entriesList');

    if(!selectedDate){
      panelDate.textContent = 'Select a date';
      panelTotal.textContent = '';
      entriesList.innerHTML = '';
      addForm.style.display = 'none';
      return;
    }

    const [y,m,d] = selectedDate.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    panelDate.textContent = dt.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

    const list = data[selectedDate] || [];
    const total = dayTotal(selectedDate);
    panelTotal.textContent = list.length ? `${total}h total` : '';

    if(list.length === 0){
      entriesList.innerHTML = '<div class="empty-note">No overtime logged for this date yet.</div>';
    }else{
      entriesList.innerHTML = list.map(e => `
        <div class="entry-row">
          <span class="entry-time">${e.shiftLabel || ''}<br><span style="font-weight:400;font-size:12px;color:var(--ink-soft);">${fmtTime(e.start)} – ${fmtTime(e.end)}</span></span>
          <span class="entry-hours">${e.hours}h</span>
          <span class="entry-note">${e.note ? escapeHtml(e.note) : ''}</span>
          <button class="entry-del" data-id="${e.id}" aria-label="Delete entry">×</button>
        </div>
      `).join('');
      entriesList.querySelectorAll('.entry-del').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          data[selectedDate] = data[selectedDate].filter(e => e.id !== btn.dataset.id);
          if(data[selectedDate].length === 0) delete data[selectedDate];
          await saveData();
          renderCalendar();
          renderPanel();
        });
      });
    }

    addForm.style.display = 'flex';
    document.getElementById('formMsg').textContent = '';

    selectedShift = null;
    const shiftBtns = document.querySelectorAll('.shift-btn');
    shiftBtns.forEach(btn=>{
      btn.classList.remove('active');
      btn.onclick = () => {
        selectedShift = btn.dataset.shift;
        shiftBtns.forEach(b => b.classList.toggle('active', b === btn));
      };
    });
  }

  function escapeHtml(s){
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  document.getElementById('addBtn').addEventListener('click', async ()=>{
    if(!selectedDate) return;
    const note = document.getElementById('noteInput').value.trim();
    const msg = document.getElementById('formMsg');

    if(!selectedShift){
      msg.textContent = 'Choose a shift first.';
      return;
    }
    const shift = SHIFTS[selectedShift];

    if(!data[selectedDate]) data[selectedDate] = [];
    const alreadyLogged = data[selectedDate].some(e => e.shift === selectedShift);
    if(alreadyLogged){
      msg.textContent = `${shift.label} is already logged for this date.`;
      return;
    }

    data[selectedDate].push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      shift: selectedShift,
      shiftLabel: shift.label,
      start: shift.start, end: shift.end, hours: shift.hours, note
    });
    data[selectedDate].sort((a,b)=> timeToMinutes(a.start) - timeToMinutes(b.start));

    await saveData();
    document.getElementById('noteInput').value = '';
    renderCalendar();
    renderPanel();
  });

  document.getElementById('prevBtn').addEventListener('click', ()=>{
    current.setMonth(current.getMonth()-1);
    renderCalendar();
  });
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    current.setMonth(current.getMonth()+1);
    renderCalendar();
  });

  (function init(){
    listenForChanges(() => {
      renderCalendar();
      renderPanel();
    });
  })();
})();
</script>
</body>
</html>
